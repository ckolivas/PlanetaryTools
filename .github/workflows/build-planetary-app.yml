name: Build and Release planetary-app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # <-- This fixes the 403 error

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: planetary-app
            asset: planetary-app-linux
          - os: windows-latest
            binary: planetary-app.exe
            asset: planetary-app-windows.exe
          # Apple Silicon (arm64) runner — covers modern Macs. For Intel Macs
          # add a second entry with os: macos-13 if you still need x86_64.
          - os: macos-latest
            binary: planetary-app
            asset: planetary-app-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: planetary-app
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: planetary-app
        run: pyinstaller --clean planetary-app.spec

      - name: Prepare binary for release
        working-directory: planetary-app
        shell: bash
        run: cp "dist/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: planetary-app/dist/${{ matrix.asset }}
