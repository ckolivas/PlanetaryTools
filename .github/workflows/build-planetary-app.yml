name: Build and Release planetary-app

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags like v0.1.0, v1.2.3, etc.
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: planetary-app
            asset_name: planetary-app-linux
          - os: windows-latest
            artifact_name: planetary-app.exe
            asset_name: planetary-app-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: planetary-app
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: planetary-app
        run: pyinstaller --onefile --windowed --clean --name planetary-app --copy-metadata imageio run.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: planetary-app/dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
