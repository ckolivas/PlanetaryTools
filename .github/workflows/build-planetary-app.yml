name: Build planetary-app

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: planetary-app
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        working-directory: planetary-app
        shell: bash
        run: >
          pyinstaller --onefile --windowed --clean --name planetary-app
          --copy-metadata imageio run.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: planetary-app-${{ matrix.os }}
          path: planetary-app/dist/
